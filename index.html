<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Chatbot na Nuvem</title>
    
    <!-- 1. Adicionando a biblioteca Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background: white; width: 450px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .historico { height: 350px; overflow-y: auto; background: #eef2f3; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        
        /* Estilos básicos para o Markdown */
        .mensagem { margin-bottom: 15px; padding: 10px; border-radius: 5px; line-height: 1.5; }
        .user { background: #007bff; color: white; text-align: right; }
        .bot { background: #ddd; color: black; text-align: left; }
        .bot code { background: #333; color: #fff; padding: 2px 5px; border-radius: 3px; }
        
        input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-enviar { background: #28a745; width: 25%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .btn-limpar { background: #dc3545; width: 100%; margin-top: 10px; padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🤖 Assistente IA</h2>
        <div class="historico" id="historico"></div>
        <div>
            <input type="text" id="pergunta" placeholder="Digite sua pergunta...">
            <button class="btn-enviar" onclick="enviarMensagem()">Enviar</button>
        </div>
        <!-- 2. Botão de Limpar -->
        <button class="btn-limpar" onclick="limparChat()">🗑️ Limpar Conversa</button>
    </div>

    <script>
        const URL_BASE = "https://api-agente-ia-6.onrender.com/api/chat";

        async function enviarMensagem() {
            const input = document.getElementById("pergunta");
            const historico = document.getElementById("historico");
            const texto = input.value;

            if(!texto) return;

            historico.innerHTML += `<div class="mensagem user">${texto}</div>`;
            input.value = "";
            historico.innerHTML += `<div class="mensagem bot" id="loading">Pensando...</div>`;
            historico.scrollTop = historico.scrollHeight;

            try {
                const resposta = await fetch(URL_BASE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pergunta: texto })
                });

                const dados = await resposta.json();
                document.getElementById("loading").remove();

                // 3. Upgrade Visual: Traduzindo Markdown para HTML
                const respostaFormatada = marked.parse(dados.resposta);
                historico.innerHTML += `<div class="mensagem bot">${respostaFormatada}</div>`;
                
                historico.scrollTop = historico.scrollHeight;
            } catch (erro) {
                document.getElementById("loading").innerHTML = "Erro de conexão ❌";
            }
        }

        async function limparChat() {
            if (!confirm("Deseja apagar todo o histórico?")) return;

            try {
                const resposta = await fetch(`${URL_BASE}/limpar`, {
                    method: "DELETE" 
                });
                
                if (resposta.ok) {
                    document.getElementById("historico").innerHTML = ""; 
                    alert("Histórico limpo!");
                }
            } catch (erro) {
                console.error("Erro ao limpar:", erro);
            }
        }
    </script>
</body>
</html>
